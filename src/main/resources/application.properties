# Server configuration
server.port=8080

# Spring Data JPA Configuration
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# H2 Database Configuration (Default for zero-setup local execution)
spring.datasource.url=jdbc:h2:mem:smartclinicdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# SQL Script Initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# JWT Configuration
jwt.secret=SmartClinicManagementSystemSecretKeyForJwtAuthenticationAndSecurityTokens2026!
jwt.expiration=86400000

